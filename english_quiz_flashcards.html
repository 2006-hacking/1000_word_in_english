* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.quiz-wrap { padding: 1.5rem 0 2rem; }

.top-bar {

  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  gap: 10px;

.mode-tabs {
  display: flex;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  overflow: hidden;
}

.mode-tab {
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  border: none;
  transition: all 0.15s;
}

.mode-tab.active {
  background: #1C1C2E;
  color: #fff;
}

.cat-select {
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
}

.score-row {
  display: flex;
  gap: 12px;
  margin-bottom: 1.5rem;
}

.score-pill {
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 20px;
  font-weight: 500;
}

.pill-good { background: #E8FBED; color: #1e6e2e; }
.pill-bad  { background: #FFE8EA; color: #991420; }
.pill-left { background: #EBF0FF; color: #1a3fa8; }

.progress-bar {
  height: 4px;
  background: var(--color-background-secondary);
  border-radius: 2px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #1C1C2E;
  border-radius: 2px;
  transition: width 0.3s;
}

.card-area { min-height: 220px; margin-bottom: 1.2rem; }

.flashcard {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: transform 0.1s;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.flashcard:active { transform: scale(0.99); }

.card-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--color-text-tertiary);
  font-weight: 500;
}

.card-word {
  font-size: 2.2rem;
  font-weight: 500;
  color: var(--color-text-primary);
}

.card-sub {
  font-size: 1rem;
  color: var(--color-text-secondary);
}

.card-example {
  font-size: 0.85rem;
  font-style: italic;
  color: var(--color-text-tertiary);
  border-left: 2px solid #1C1C2E;
  padding-left: 10px;
  text-align: left;
  max-width: 340px;
}

.flip-hint {
  font-size: 12px;
  color: var(--color-text-tertiary);
  text-align: center;
  margin-bottom: 1rem;
}

.flash-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 0.5rem;
}

.btn-know {
  padding: 9px 24px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid #1e6e2e;
  background: #E8FBED;
  color: #1e6e2e;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-know:hover { background: #c5f0d5; }

.btn-learn {
  padding: 9px 24px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid #991420;
  background: #FFE8EA;
  color: #991420;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-learn:hover { background: #ffc8cc; }

.btn-next {
  padding: 9px 24px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-next:hover { background: var(--color-background-secondary); }

.btn-primary {
  padding: 9px 24px;
  border-radius: var(--border-radius-md);
  border: none;
  background: #1C1C2E;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }

.qcm-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1rem;
}

.qcm-opt {
  padding: 14px 16px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.qcm-opt:hover:not(.disabled) { background: var(--color-background-secondary); }
.qcm-opt.correct { background: #E8FBED; color: #1e6e2e; border-color: #5CC76E; }
.qcm-opt.wrong   { background: #FFE8EA; color: #991420; border-color: #E8525A; }
.qcm-opt.disabled { cursor: default; }

.typing-area { margin-bottom: 1rem; }
.typing-area input {
  width: 100%;
  text-align: center;
  font-size: 1.1rem;
  padding: 12px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
}
.typing-feedback {
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  margin-top: 8px;
  min-height: 22px;
}

.end-screen {
  text-align: center;
  padding: 2rem 1rem;
}

.end-score {
  font-size: 3rem;
  font-weight: 500;
  color: var(--color-text-primary);

}

.end-label {
  font-size: 1rem;

  margin-bottom: 1.5rem;
}

.end-stars {
  font-size: 1.8rem;
  letter-spacing: 4px;
  margin-bottom: 1.5rem;
}

.hidden { display: none !important; }

  restart();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function restart(from) {
  const cat = document.getElementById('catSelect').value;
  let pool = cat === 'all' ? ALL_WORDS : ALL_WORDS.filter(w => w.cat === cat);
  if (from === 'wrong' && wrongWords.length > 0) {
    pool = wrongWords;
  }
  deck = shuffle([...pool]).slice(0, Math.min(QUIZ_SIZE, pool.length));
  wrongWords = [];
  idx = 0; good = 0; bad = 0; flipped = false; answered = false;
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('mainArea').classList.remove('hidden');
  updateScore();
  render();
}

function updateScore() {
  document.getElementById('scoreGood').textContent = 'Correct : ' + good;
  document.getElementById('scoreBad').textContent  = 'À revoir : ' + bad;
  document.getElementById('scoreLeft').textContent = 'Restants : ' + (deck.length - idx);
  const pct = deck.length > 0 ? Math.round((idx / deck.length) * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
}

function render() {
  if (idx >= deck.length) { showEnd(); return; }
  const w = deck[idx];
  if (mode === 'flash') renderFlash(w);
  else if (mode === 'qcm') renderQCM(w);
  else renderType(w);
}

function renderFlash(w) {
  flipped = false;
  document.getElementById('mainArea').innerHTML = `
    <div class="card-area">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-label">anglais</div>
        <div class="card-word" id="cardWord">${w.en}</div>
        <div class="card-sub hidden" id="cardFr">${w.fr}</div>
        <div class="card-example hidden" id="cardEx">${w.ex}</div>
      </div>
    </div>
    <div class="flip-hint" id="flipHint">Cliquer pour révéler la traduction</div>
    <div class="flash-btns hidden" id="flashBtns">
      <button class="btn-know" onclick="markFlash(true)">Je connais</button>
      <button class="btn-learn" onclick="markFlash(false)">À revoir</button>
    </div>
  `;
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('cardFr').classList.remove('hidden');
  document.getElementById('cardEx').classList.remove('hidden');
  document.getElementById('flipHint').textContent = 'Tu connaissais ce mot ?';
  document.getElementById('flashBtns').classList.remove('hidden');
}

function markFlash(known) {
  if (known) good++; else { bad++; wrongWords.push(deck[idx]); }
  idx++;
  updateScore();
  render();
}

function renderQCM(w) {
  answered = false;
  const pool = ALL_WORDS.filter(x => x.en !== w.en);
  const wrong3 = shuffle([...pool]).slice(0, 3).map(x => x.fr);
  const options = shuffle([w.fr, ...wrong3]);
  document.getElementById('mainArea').innerHTML = `
    <div class="card-area">
      <div class="flashcard" style="cursor:default;">
        <div class="card-label">Traduis en français</div>
        <div class="card-word">${w.en}</div>
      </div>
    </div>
    <div class="qcm-options" id="opts">
      ${options.map((o,i) => `<button class="qcm-opt" onclick="answerQCM(this,'${o.replace(/'/g,"\\'")}','${w.fr.replace(/'/g,"\\'")}',${i})">${o}</button>`).join('')}
    </div>
    <div style="text-align:center;" id="nextBtn" class="hidden">
      <button class="btn-next" onclick="nextQ()">Suivant</button>
    </div>
  `;
}

function answerQCM(btn, chosen, correct, i) {
  if (answered) return;
  answered = true;
  const opts = document.querySelectorAll('.qcm-opt');
  opts.forEach(o => o.classList.add('disabled'));
  if (chosen === correct) {
    btn.classList.add('correct');
    good++;
  } else {
    btn.classList.add('wrong');
    opts.forEach(o => { if (o.textContent === correct) o.classList.add('correct'); });
    bad++;
    wrongWords.push(deck[idx]);
  }
  document.getElementById('nextBtn').classList.remove('hidden');
  updateScore();
}

function nextQ() { idx++; updateScore(); render(); }

function renderType(w) {
  answered = false;
  document.getElementById('mainArea').innerHTML = `
    <div class="card-area">
      <div class="flashcard" style="cursor:default;">
        <div class="card-label">Écris en anglais</div>
        <div class="card-word">${w.fr}</div>
        <div style="font-size:13px;color:var(--color-text-tertiary);margin-top:8px;">Indice : ${w.ex.replace(w.en,'_____')}</div>
      </div>
    </div>
    <div class="typing-area">
      <input type="text" id="typeInput" placeholder="Tape le mot en anglais..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkType('${w.en.replace(/'/g,"\\'")}')">
      <div class="typing-feedback" id="typeFeedback"></div>
    </div>
    <div style="text-align:center;display:flex;gap:10px;justify-content:center;" id="typeBtns">
      <button class="btn-primary" onclick="checkType('${w.en.replace(/'/g,"\\'")}')">Vérifier</button>
      <button class="btn-next" onclick="skipType('${w.en.replace(/'/g,"\\'")}')">Passer</button>
    </div>
    <div style="text-align:center;margin-top:12px;" id="typeNext" class="hidden">
      <button class="btn-next" onclick="nextQ()">Suivant</button>
    </div>
  `;
  setTimeout(() => { const el = document.getElementById('typeInput'); if(el) el.focus(); }, 100);
}

function checkType(correct) {
  if (answered) return;
  const input = document.getElementById('typeInput');
  if (!input) return;
  const val = input.value.trim().toLowerCase();
  if (!val) return;
  answered = true;
  input.disabled = true;
  const fb = document.getElementById('typeFeedback');
  document.getElementById('typeBtns').classList.add('hidden');
  document.getElementById('typeNext').classList.remove('hidden');
  if (val === correct.toLowerCase()) {
    fb.style.color = '#1e6e2e';
    fb.textContent = 'Parfait ! "' + correct + '"';
    good++;
  } else {
    fb.style.color = '#991420';
    fb.textContent = 'Pas tout à fait. La bonne réponse : "' + correct + '"';
    bad++;
    wrongWords.push(deck[idx]);
  }
  updateScore();
}

function skipType(correct) {
  if (answered) return;
  answered = true;
  const input = document.getElementById('typeInput');
  if (input) input.disabled = true;
  const fb = document.getElementById('typeFeedback');
  fb.style.color = '#555';
  fb.textContent = 'Réponse : "' + correct + '"';
  document.getElementById('typeBtns').classList.add('hidden');
  document.getElementById('typeNext').classList.remove('hidden');
  bad++;
  wrongWords.push(deck[idx]);
  updateScore();
}

function showEnd() {
  document.getElementById('mainArea').classList.add('hidden');
  const end = document.getElementById('endScreen');
  end.classList.remove('hidden');
  const total = deck.length;
  document.getElementById('endScore').textContent = good + ' / ' + total;
  const pct = total > 0 ? good / total : 0;
  let stars = '';
  const full = Math.round(pct * 5);
  for (let i = 0; i < 5; i++) stars += i < full ? '★' : '☆';
  document.getElementById('endStars').textContent = stars;
  const labels = ['Continue d\'essayer !', 'Bon début, continue !', 'Pas mal du tout !', 'Très bien !', 'Excellent !', 'Parfait !'];
  document.getElementById('endLabel').textContent = labels[full];
  document.getElementById('progFill').style.width = '100%';
}

restart();
</script>
