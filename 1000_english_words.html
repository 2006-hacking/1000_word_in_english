    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.18s;
    background: #F7F4EF;
    color: #555;
  }

  .tab:hover { border-color: #1C1C2E; color: #1C1C2E; }
  .tab.active { background: #1C1C2E; color: white; }

  .content { padding: 1.5rem 2rem 3rem; max-width: 1100px; margin: 0 auto; }

  .category-section {
    margin-bottom: 2.5rem;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
    padding-bottom: 0.7rem;
    border-bottom: 2px solid;
  }

  .cat-emoji { font-size: 1.4rem; }

  .category-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
  }

  .word-count {
    margin-left: auto;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    opacity: 0.8;
  }

  .words-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .word-card {
    background: white;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    border: 1px solid #ede9e1;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;

  .word-card:hover {

function buildTabs() {
  const tabsEl = document.getElementById('filterTabs');
  categories.forEach(cat => {
    const t = document.createElement('span');
    t.className = 'tab';
    t.dataset.cat = cat.id;
    t.textContent = cat.emoji + ' ' + cat.name;
    tabsEl.appendChild(t);
  });
  tabsEl.addEventListener('click', e => {
    if (!e.target.classList.contains('tab')) return;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    e.target.classList.add('active');
    filterByCategory(e.target.dataset.cat);
  });
}

function buildContent() {
  const main = document.getElementById('mainContent');
  categories.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = `category-section cat-${cat.id}`;
    sec.dataset.catId = cat.id;
    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><h2>${cat.name}</h2><span class="word-count">${cat.words.length} mots</span>`;
    const grid = document.createElement('div');
    grid.className = 'words-grid';
    cat.words.forEach(w => {
      const card = document.createElement('div');
      card.className = 'word-card';
      card.dataset.en = w.en.toLowerCase();
      card.dataset.fr = w.fr.toLowerCase();
      card.innerHTML = `<div class="word-english">${w.en}</div><div class="word-french">${w.fr}</div><div class="word-example">${w.ex}</div>`;
      grid.appendChild(card);
    });
    sec.appendChild(hdr);
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

function filterByCategory(cat) {
  document.querySelectorAll('.category-section').forEach(sec => {
    sec.classList.toggle('hidden', cat !== 'all' && sec.dataset.catId !== cat);
  });
  document.getElementById('searchInput').value = '';
}

function setupSearch() {
  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.tab[data-cat="all"]').classList.add('active');
    document.querySelectorAll('.category-section').forEach(sec => sec.classList.remove('hidden'));
    if (!q) {
      document.querySelectorAll('.word-card').forEach(c => c.classList.remove('hidden'));
      return;
    }
    document.querySelectorAll('.word-card').forEach(card => {
      const match = card.dataset.en.includes(q) || card.dataset.fr.includes(q);
      card.classList.toggle('hidden', !match);
    });
    document.querySelectorAll('.category-section').forEach(sec => {
      const visible = sec.querySelectorAll('.word-card:not(.hidden)').length > 0;
      sec.classList.toggle('hidden', !visible);
    });
  });
}

buildTabs();
buildContent();
setupSearch();
</script>
